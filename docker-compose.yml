services:
  mongodb:
    image: mongo:7
    container_name: ai-book-reader-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 8

  python-backend:
    build:
      context: .
      dockerfile: python-backend/Dockerfile
    container_name: ai-book-reader-python
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./python-backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-book-reader-backend
    env_file:
      - .env.docker
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      python-backend:
        condition: service_started

volumes:
  mongo_data:
